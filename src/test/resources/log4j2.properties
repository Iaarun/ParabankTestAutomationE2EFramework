status = error
name = ParaBankTestE2EFramework

appenders = console, file

appender.console.type = Console
appender.console.name = STDOUT
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = [%d{yyyy-MM-dd HH:mm:ss}] [%t] %-5level %logger{36} - %msg%n

appender.file.type = File
appender.file.name = FILE
appender.file.fileName = target/log/parabanktestlogs.log
appender.file.append = true
appender.file.layout.type = PatternLayout
appender.file.layout.pattern = [%d{yyyy-MM-dd HH:mm:ss}] [thread-%t] %-5level %logger{36} - %msg%n

loggers = hooks, utilities, root

logger.hooks.name = hooks
logger.hooks.level = info
logger.hooks.additivity = false
logger.hooks.appenderRefs = file, console
logger.hooks.appenderRef.file.ref = FILE
logger.hooks.appenderRef.console.ref = STDOUT

logger.utilities.name = utilities
logger.utilities.level = debug
logger.utilities.additivity = false
logger.utilities.appenderRefs = file
logger.utilities.appenderRef.file.ref = FILE

rootLogger.level = info
rootLogger.appenderRefs = console, file
rootLogger.appenderRef.console.ref = STDOUT
rootLogger.appenderRef.file.ref = FILE